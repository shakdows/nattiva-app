<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Nattiva</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#A8191B;--red-d:#7C1012;--gold:#C49A3C;--ink:#111;--ink-60:rgba(17,17,17,.6);--ink-20:rgba(17,17,17,.1);--paper:#F8F6F2;--white:#fff;--serif:'Cormorant Garamond',serif;--sans:'Jost',sans-serif;--sh:0 2px 16px rgba(0,0,0,.07);--sh-md:0 8px 32px rgba(0,0,0,.12);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:var(--sans);}

header{position:sticky;top:0;z-index:100;background:rgba(248,246,242,.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--ink-20);height:58px;}
.hd{max-width:900px;margin:0 auto;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;}
.back{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-60);cursor:pointer;text-decoration:none;}
.back svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.hd-t{font-family:var(--serif);font-size:20px;font-weight:400;}
.hd-t span{color:var(--red);font-weight:600;}

.wrap{max-width:900px;margin:0 auto;padding:20px 20px 80px;}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--white);border-radius:10px;padding:4px;border:1px solid var(--ink-20);width:fit-content;margin-bottom:24px;box-shadow:var(--sh);}
.tab{padding:9px 24px;border-radius:7px;font-size:12px;font-weight:600;letter-spacing:.05em;cursor:pointer;color:var(--ink-60);transition:all .2s;}
.tab.active{background:var(--red);color:var(--white);box-shadow:0 3px 10px rgba(168,25,27,.3);}

/* FORM */
.card{background:var(--white);border-radius:18px;border:1px solid var(--ink-20);box-shadow:var(--sh-md);padding:28px;}
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:7px;margin-bottom:16px;}
.sec-lbl::before{content:'';width:18px;height:1px;background:var(--red);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-60);}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--ink-20);background:#FAFAF8;color:var(--ink);border-radius:9px;padding:11px 13px;font-size:14px;outline:none;transition:all .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red);background:var(--white);}
.field textarea{resize:vertical;min-height:70px;}
.field.full{grid-column:1/-1;}

/* PILLS */
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;}
.pill{padding:7px 16px;border-radius:50px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--ink-20);color:var(--ink-60);background:var(--white);transition:all .2s;user-select:none;}
.pill.on{background:var(--red);color:var(--white);border-color:var(--red);}

/* SUBMIT */
.btn-save{width:100%;background:var(--red);color:var(--white);border:none;border-radius:10px;padding:14px;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s;margin-top:8px;}
.btn-save:hover{background:var(--red-d);}

/* VIS */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.search{flex:1;min-width:180px;position:relative;}
.search input{width:100%;border:1.5px solid var(--ink-20);background:var(--white);border-radius:9px;padding:10px 13px 10px 36px;font-size:13px;outline:none;}
.search input:focus{border-color:var(--red);}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--ink-60);stroke-width:2;fill:none;}
.fsel{border:1.5px solid var(--ink-20);background:var(--white);border-radius:9px;padding:10px 13px;font-size:12px;font-weight:600;color:var(--ink-60);cursor:pointer;outline:none;}
.cnt{font-size:12px;font-weight:600;color:var(--ink-60);white-space:nowrap;}
.cnt b{color:var(--red);font-size:15px;}

.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:800px){.cgrid{grid-template-columns:1fr 1fr;}}
@media(max-width:500px){.cgrid{grid-template-columns:1fr;}}

.cc{background:var(--white);border-radius:14px;border:1px solid var(--ink-20);box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;}
.cc:hover{transform:translateY(-3px);box-shadow:var(--sh-md);}
.cc-bar{height:4px;}
.cc-body{padding:14px 16px;}
.cc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--white);}
.est-tag{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:4px;padding:3px 7px;}
.cc-name{font-family:var(--serif);font-size:16px;margin-bottom:2px;}
.cc-tel{font-size:11px;color:var(--ink-60);margin-bottom:6px;}
.cc-budget{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--red);}
.cc-footer{padding:9px 16px;border-top:1px solid var(--ink-20);background:#FAFAF8;display:flex;justify-content:space-between;align-items:center;}
.cc-int{font-size:10px;color:var(--ink-60);}
.cc-more{font-size:10px;font-weight:700;color:var(--red);background:none;border:none;cursor:pointer;}

.empty{text-align:center;padding:50px;grid-column:1/-1;color:var(--ink-60);font-size:14px;}

/* MODAL */
.mbg{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s;}
.mbg.on{opacity:1;pointer-events:all;}
.mbox{position:fixed;top:50%;left:50%;transform:translate(-50%,-44%);width:92%;max-width:540px;max-height:85vh;background:var(--paper);border-radius:20px;z-index:700;overflow-y:auto;opacity:0;pointer-events:none;transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .3s;scrollbar-width:none;}
.mbox::-webkit-scrollbar{display:none;}
.mbox.on{transform:translate(-50%,-50%);opacity:1;pointer-events:all;}
@media(max-width:500px){.mbox{top:auto;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);border-radius:20px 20px 0 0;max-height:88vh;width:100%;max-width:none;}.mbox.on{transform:translateX(-50%) translateY(0);}}
.mhandle{width:36px;height:4px;border-radius:2px;background:var(--ink-20);margin:12px auto 0;}
.mbody{padding:18px 22px 24px;}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.mf{background:var(--white);border-radius:9px;padding:10px 12px;border:1px solid var(--ink-20);}
.mf-l{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-60);margin-bottom:2px;}
.mf-v{font-size:13px;font-weight:600;color:var(--ink);}
.macts{display:flex;gap:10px;margin-top:16px;}
.mact{flex:1;padding:12px;border-radius:9px;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;text-align:center;cursor:pointer;border:none;transition:all .2s;}
.mact.wa{background:#25D366;color:var(--white);}
.mact.del{background:var(--white);color:#C62828;border:1.5px solid #C62828;}
.mact.del:hover{background:#C62828;color:var(--white);}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1B5E20;color:var(--white);border-radius:10px;padding:12px 22px;font-size:13px;font-weight:600;box-shadow:0 6px 24px rgba(0,0,0,.2);transition:transform .4s cubic-bezier(.22,1,.36,1);z-index:999;}
.toast.on{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <div class="hd">
    <a href="index.html" class="back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Volver</a>
    <div class="hd-t">CRM <span>Nattiva</span></div>
    <div style="width:60px"></div>
  </div>
</header>

<div class="wrap">
  <div class="tabs">
    <div class="tab active" onclick="tab('form',this)">➕ Nuevo Cliente</div>
    <div class="tab" onclick="tab('vis',this)">👥 Ver Clientes</div>
  </div>

  <!-- FORM -->
  <div id="v-form">
    <div class="card">
      <!-- Datos básicos -->
      <div class="sec-lbl">Datos del cliente</div>
      <div class="grid">
        <div class="field"><label>Nombre *</label><input id="f-nom" type="text" placeholder="Nombre completo"></div>
        <div class="field"><label>Teléfono / WhatsApp *</label><input id="f-tel" type="tel" placeholder="+51 987 654 321"></div>
        <div class="field"><label>Email</label><input id="f-email" type="email" placeholder="correo@email.com"></div>
        <div class="field"><label>Distrito</label><input id="f-dist" type="text" placeholder="Ej: Miraflores"></div>
      </div>

      <!-- Intención -->
      <div class="sec-lbl">¿Qué desea?</div>
      <div class="pills" id="p-int">
        <div class="pill" onclick="this.classList.toggle('on')">🏠 Comprar</div>
        <div class="pill" onclick="this.classList.toggle('on')">💰 Invertir</div>
        <div class="pill" onclick="this.classList.toggle('on')">🔑 Alquilar</div>
        <div class="pill" onclick="this.classList.toggle('on')">📋 Vender</div>
      </div>

      <!-- Inmueble -->
      <div class="sec-lbl">Inmueble buscado</div>
      <div class="grid">
        <div class="field"><label>Tipo</label>
          <select id="f-tipo">
            <option value="">Seleccionar...</option>
            <option>Departamento</option><option>Casa</option>
            <option>Penthouse</option><option>Oficina</option><option>Terreno</option>
          </select>
        </div>
        <div class="field"><label>Zona preferida</label><input id="f-zona" type="text" placeholder="Ej: San Isidro"></div>
        <div class="field"><label>Presupuesto (USD)</label>
          <select id="f-pres">
            <option value="">Seleccionar...</option>
            <option>Hasta $100K</option><option>$100K – $250K</option>
            <option>$250K – $500K</option><option>$500K – $1M</option><option>Más de $1M</option>
          </select>
        </div>
        <div class="field"><label>Urgencia</label>
          <select id="f-urg">
            <option value="">Seleccionar...</option>
            <option>Inmediata</option><option>1–3 meses</option>
            <option>3–6 meses</option><option>+6 meses</option>
          </select>
        </div>
      </div>

      <!-- Estado y notas -->
      <div class="sec-lbl">Estado y notas</div>
      <div class="grid">
        <div class="field"><label>Estado del cliente</label>
          <select id="f-est">
            <option value="prospect">🔵 Prospecto</option>
            <option value="hot">🔴 Caliente</option>
            <option value="process">🟡 En proceso</option>
            <option value="closed">🟢 Cerrado</option>
          </select>
        </div>
        <div class="field"><label>Fecha de visita</label><input id="f-fecha" type="date"></div>
        <div class="field full"><label>Notas</label><textarea id="f-notas" placeholder="Observaciones del cliente..."></textarea></div>
      </div>

      <button class="btn-save" onclick="save()">💾 Guardar cliente</button>
    </div>
  </div>

  <!-- VIS -->
  <div id="v-vis" style="display:none;">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <h2 style="font-family:var(--serif);font-size:28px;font-weight:400;">Mis <strong style="color:var(--red);font-weight:600;">Clientes</strong></h2>
      <button onclick="tab('form',null)" style="background:var(--red);color:white;border:none;border-radius:8px;padding:9px 18px;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;">+ Nuevo</button>
    </div>
    <div class="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="s-q" placeholder="Buscar nombre, teléfono..." oninput="render()">
      </div>
      <select class="fsel" id="s-int" onchange="render()">
        <option value="">Todas las intenciones</option>
        <option>Comprar</option><option>Invertir</option><option>Alquilar</option><option>Vender</option>
      </select>
      <select class="fsel" id="s-est" onchange="render()">
        <option value="">Todos los estados</option>
        <option value="hot">🔴 Caliente</option>
        <option value="prospect">🔵 Prospecto</option>
        <option value="process">🟡 En proceso</option>
        <option value="closed">🟢 Cerrado</option>
      </select>
      <div class="cnt">Total: <b id="cnt">0</b></div>
    </div>
    <div class="cgrid" id="cgrid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="mbg" id="mbg" onclick="closeM()"></div>
<div class="mbox" id="mbox">
  <div class="mhandle"></div>
  <div class="mbody" id="mbody"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ Cliente guardado</div>

<script>
const KEY = 'nattiva_crm_v2';
const EC = {hot:{c:'#C62828',bg:'#FFEBEE',l:'🔴 Caliente'},prospect:{c:'#1565C0',bg:'#E3F2FD',l:'🔵 Prospecto'},process:{c:'#E65100',bg:'#FFF3E0',l:'🟡 En proceso'},closed:{c:'#2E7D32',bg:'#E8F5E9',l:'🟢 Cerrado'}};
const AVC=['#A8191B','#1565C0','#2E7D32','#6A1B9A','#E65100','#00695C'];
const load=()=>{try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}};
const save_=a=>localStorage.setItem(KEY,JSON.stringify(a));
const ini=n=>n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
const avc=n=>{let h=0;for(let c of n)h+=c.charCodeAt(0);return AVC[h%AVC.length]};
const fmt=v=>{const n=parseInt(v||0);return n?'$'+n.toLocaleString():'—'};

// Init date
document.getElementById('f-fecha').value=new Date().toISOString().split('T')[0];

function tab(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
  else document.querySelectorAll('.tab')[t==='form'?0:1].classList.add('active');
  document.getElementById('v-form').style.display=t==='form'?'block':'none';
  document.getElementById('v-vis').style.display=t==='vis'?'block':'none';
  if(t==='vis') render();
}

function save(){
  const nom=document.getElementById('f-nom').value.trim();
  const tel=document.getElementById('f-tel').value.trim();
  if(!nom){alert('Ingresa el nombre');return;}
  if(!tel){alert('Ingresa el teléfono');return;}
  const ints=[...document.querySelectorAll('#p-int .pill.on')].map(p=>p.textContent.trim());
  const c={
    id:Date.now(),nom,tel,
    email:document.getElementById('f-email').value.trim(),
    dist:document.getElementById('f-dist').value.trim(),
    intencion:ints,
    tipo:document.getElementById('f-tipo').value,
    zona:document.getElementById('f-zona').value.trim(),
    pres:document.getElementById('f-pres').value,
    urg:document.getElementById('f-urg').value,
    estado:document.getElementById('f-est').value,
    fecha:document.getElementById('f-fecha').value,
    notas:document.getElementById('f-notas').value.trim(),
    creado:new Date().toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'})
  };
  const arr=load(); arr.unshift(c); save_(arr);
  // Reset
  ['f-nom','f-tel','f-email','f-dist','f-zona','f-notas'].forEach(id=>document.getElementById(id).value='');
  ['f-tipo','f-pres','f-urg'].forEach(id=>document.getElementById(id).selectedIndex=0);
  document.getElementById('f-est').selectedIndex=0;
  document.querySelectorAll('.pill.on').forEach(p=>p.classList.remove('on'));
  // Toast
  const t=document.getElementById('toast');t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
  setTimeout(()=>tab('vis',null),600);
}

function render(){
  const q=(document.getElementById('s-q').value||'').toLowerCase();
  const fi=document.getElementById('s-int').value;
  const fe=document.getElementById('s-est').value;
  let arr=load().filter(c=>{
    const ms=!q||(c.nom||'').toLowerCase().includes(q)||(c.tel||'').includes(q)||(c.zona||'').toLowerCase().includes(q);
    const mi=!fi||(c.intencion||[]).some(i=>i.includes(fi));
    const me=!fe||c.estado===fe;
    return ms&&mi&&me;
  });
  document.getElementById('cnt').textContent=arr.length;
  const g=document.getElementById('cgrid');
  if(!arr.length){g.innerHTML='<div class="empty">No hay clientes aún.<br>¡Agrega el primero!</div>';return;}
  const ec=id=>EC[id]||EC.prospect;
  g.innerHTML=arr.map(c=>`
    <div class="cc" onclick="openM(${c.id})">
      <div class="cc-bar" style="background:${ec(c.estado).c}"></div>
      <div class="cc-body">
        <div class="cc-top">
          <div class="av" style="background:${avc(c.nom)}">${ini(c.nom)}</div>
          <span class="est-tag" style="background:${ec(c.estado).bg};color:${ec(c.estado).c}">${ec(c.estado).l}</span>
        </div>
        <div class="cc-name">${c.nom}</div>
        <div class="cc-tel">${c.tel}${c.dist?' · '+c.dist:''}</div>
        <div class="cc-budget">${c.pres||'Sin presupuesto'}</div>
      </div>
      <div class="cc-footer">
        <span class="cc-int">${(c.intencion||[]).join(', ')||'—'}</span>
        <button class="cc-more">Ver →</button>
      </div>
    </div>`).join('');
}

function openM(id){
  const c=load().find(x=>x.id===id);if(!c)return;
  const ec=EC[c.estado]||EC.prospect;
  const f=(l,v)=>v?`<div class="mf"><div class="mf-l">${l}</div><div class="mf-v">${v}</div></div>`:'';
  document.getElementById('mbody').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div style="width:44px;height:44px;border-radius:50%;background:${avc(c.nom)};display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:white;flex-shrink:0;">${ini(c.nom)}</div>
      <div>
        <div style="font-family:var(--serif);font-size:22px;">${c.nom}</div>
        <span style="font-size:9px;font-weight:700;background:${ec.bg};color:${ec.c};padding:3px 8px;border-radius:4px;">${ec.l}</span>
      </div>
      <button onclick="closeM()" style="margin-left:auto;width:30px;height:30px;border-radius:50%;background:var(--ink-20);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;">✕</button>
    </div>
    <div class="mrow">
      ${f('Teléfono',c.tel)}${f('Email',c.email)}
      ${f('Distrito',c.dist)}${f('Fecha visita',c.fecha)}
    </div>
    <div class="mrow">
      ${f('Intención',(c.intencion||[]).join(', '))}
      ${f('Tipo inmueble',c.tipo)}
      ${f('Zona',c.zona)}${f('Presupuesto',c.pres)}
      ${f('Urgencia',c.urg)}${f('Registrado',c.creado)}
    </div>
    ${c.notas?`<div style="background:var(--white);border-radius:9px;padding:12px;border:1px solid var(--ink-20);font-size:13px;color:var(--ink-60);line-height:1.6;margin-bottom:14px;">${c.notas}</div>`:''}
    <div class="macts">
      <button class="mact wa" onclick="window.open('https://wa.me/${c.tel.replace(/[^0-9]/g,'')}','_blank')">📱 WhatsApp</button>
      <button class="mact del" onclick="del(${c.id})">🗑 Eliminar</button>
    </div>`;
  document.getElementById('mbg').classList.add('on');
  document.getElementById('mbox').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeM(){
  document.getElementById('mbg').classList.remove('on');
  document.getElementById('mbox').classList.remove('on');
  document.body.style.overflow='';
}
function del(id){
  if(!confirm('¿Eliminar este cliente?'))return;
  save_(load().filter(c=>c.id!==id));
  closeM(); render();
}
</script>
</body>
</html>
