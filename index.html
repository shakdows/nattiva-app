<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nattiva Estate — Plataforma Inmobiliaria</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--crimson:#A8191B;--crimson-d:#7C1012;--gold:#C49A3C;--gold-l:#DEB96A;--ink:#111111;--ink-60:rgba(17,17,17,.6);--ink-20:rgba(17,17,17,.1);--paper:#F8F6F2;--white:#FFFFFF;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',sans-serif;--sh:0 2px 16px rgba(0,0,0,.07);--sh-md:0 8px 32px rgba(0,0,0,.12);--sh-lg:0 20px 60px rgba(0,0,0,.18);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{font-family:var(--sans);cursor:pointer;border:none;background:none}

/* Header, Hero, Cotizador, etc. (Tu CSS original) */
header{position:sticky;top:0;z-index:300;background:rgba(248,246,242,.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--ink-20);height:66px;}
.hd-inner{max-width:1280px;margin:0 auto;padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between;}
.page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;background:var(--paper);overflow-y:auto;padding-bottom:90px;}
.page.visible{display:block;}

/* Auth Screens */
.locked > *:not(#auth-screen) { display:none !important; }
#auth-screen { display:none; position:fixed; inset:0; z-index:99999; align-items:center; justify-content:center; background:#0a0101; }
#auth-screen.show { display:flex; }
.aslide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.5s;}
.aslide.on{opacity:1;}
.aslide:nth-child(1){background-image:url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1600&q=80');}
.aslide:nth-child(2){background-image:url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1600&q=80');}
.aslide:nth-child(3){background-image:url('https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=1600&q=80');}
.aslide:nth-child(4){background-image:url('https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=1600&q=80');}
.aoverlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(5,0,0,.82),rgba(140,20,20,.5));z-index:1;}
.acard{position:relative;z-index:10;background:#fff;border-radius:26px;box-shadow:0 30px 80px rgba(0,0,0,.5);padding:52px 48px 44px;width:92%;max-width:430px;text-align:center;}
.acard-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;background:#fff;color:#111;border:1.5px solid #dadce0;border-radius:12px;padding:15px 20px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.acard-err{display:none;margin-top:14px;padding:12px;background:#FFEBEE;border-radius:8px;color:#C62828;font-size:12px;font-weight:600;}
</style>
</head>
<body class="locked">

<div id="auth-screen">
  <div class="aslide on"></div><div class="aslide"></div><div class="aslide"></div><div class="aslide"></div>
  <div class="aoverlay"></div>
  <div class="acard">
    <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:30px;font-weight:400;color:#111;margin-bottom:10px;">Bienvenida a <strong style="color:#A8191B;font-weight:600;">Nattiva</strong></div>
    <button class="acard-btn" onclick="doAuth()">Continuar con Google</button>
    <div class="acard-err" id="aerr"></div>
  </div>
</div>

<header>
    <div class="hd-inner">
        <div class="logo">Nattiva Estate</div>
    </div>
</header>

<div id="page-home" class="page visible">
    <main>
        <h1>Bienvenido</h1>
        <button onclick="goProyectos()">Ver Proyectos</button>
    </main>
</div>

<div id="page-proyectos" class="page">
    <header class="proj-hd"><div class="proj-hd-inner">
        <button class="back-btn" onclick="goHome()">Inicio</button>
    </div></header>
    <main>
        <h1>Proyectos</h1>
    </main>
</div>

<script>
    // --- Lógica de Navegación ---
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => { p.classList.remove('visible'); p.style.display='none'; });
        const el = document.getElementById(id);
        if(el) { el.classList.add('visible'); el.style.display='block'; }
    }
    function goHome() { showPage('page-home'); }
    function goProyectos() { showPage('page-proyectos'); }

    // --- Lógica de Autenticación ---
    const _CID = '720760462500-0b840s7abh9o6uorth1mi126h8cli473.apps.googleusercontent.com';
    const _OK  = ['aramramirez1995@gmail.com'];

    (function(){
        const ok = sessionStorage.getItem('nv_ok');
        if(!ok || !_OK.includes(ok)){
            document.body.classList.add('locked');
            document.getElementById('auth-screen').classList.add('show');
            let i=0;
            const s=document.querySelectorAll('.aslide');
            setInterval(()=>{s[i].classList.remove('on');i=(i+1)%s.length;s[i].classList.add('on');},5000);
        }
    })();

    function doAuth(){
        google.accounts.id.initialize({
            client_id: _CID,
            callback: function(r){
                try {
                    const p = JSON.parse(atob(r.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
                    const em = (p.email||'').toLowerCase();
                    if(_OK.includes(em)){
                        sessionStorage.setItem('nv_ok', em);
                        document.getElementById('auth-screen').classList.remove('show');
                        document.body.classList.remove('locked');
                    } else {
                        const e = document.getElementById('aerr');
                        e.style.display = 'block';
                        e.innerHTML = '⚠️ El correo <b>'+em+'</b> no está autorizado.';
                    }
                } catch(err) { console.error(err); }
            }
        });
        google.accounts.id.prompt();
    }
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
