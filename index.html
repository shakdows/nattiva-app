<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nattiva Estate — Plataforma Inmobiliaria</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Aquí iría tu CSS completo, lo he omitido para brevedad, pero asegúrate de mantenerlo tal cual estaba -->
<style>
    /* (MANTÉN TODO TU CSS AQUÍ) */
    .page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;background:var(--paper);overflow-y:auto;padding-bottom:90px;}
    .page.visible{display:block;}
</style>
</head>

<body class="locked">
<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="aslide on"></div><div class="aslide"></div><div class="aslide"></div><div class="aslide"></div>
  <div class="aoverlay"></div>
  <div class="acard">
    <svg viewBox="0 0 210 56" width="160" height="44" style="display:block;margin:0 auto 28px" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="44" font-family="Georgia,serif" font-size="46" font-weight="600" font-style="italic" fill="#A8191B">nattiva</text>
    </svg>
    <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:30px;font-weight:400;color:#111;margin-bottom:10px;">Bienvenida a <strong style="color:#A8191B;font-weight:600;">Nattiva</strong></div>
    <button class="acard-btn" onclick="doAuth()">Continuar con Google</button>
    <div class="acard-err" id="aerr"></div>
  </div>
</div>

<!-- (MANTÉN EL RESTO DE TU HTML AQUÍ HASTA EL CIERRE DEL BODY) -->

<script>
// --- LOGICA DE PAGINAS ---
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('visible');
    p.style.display='none';
  });
  const el=document.getElementById(id);
  if(el){ el.classList.add('visible'); el.style.display='block'; el.scrollTop=0; }
}

function goHome(){
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('visible'); p.style.display='none';
  });
  document.querySelectorAll('.nb').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-home').classList.add('active');
}

function goProyectos(){
  showPage('page-proyectos');
  document.querySelectorAll('.nb').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-proj').classList.add('active');
}

// --- LOGICA DE PROPIEDADES Y MODALES ---
// ... (Aquí coloca tus funciones filterProps, openBrochure, closeBrochure, switchPlan, etc.) ...

// --- LOGICA DE AUTH ---
const _CID = '720760462500-0b840s7abh9o6uorth1mi126h8cli473.apps.googleusercontent.com';
const _OK  = ['aramramirez1995@gmail.com'];

(function(){
  const ok = sessionStorage.getItem('nv_ok');
  if(!ok || !_OK.includes(ok)){
    document.body.classList.add('locked');
    document.getElementById('auth-screen').classList.add('show');
    let i=0;
    const s=document.querySelectorAll('.aslide');
    if(s.length) setInterval(()=>{s[i].classList.remove('on');i=(i+1)%s.length;s[i].classList.add('on');},5000);
  }
})();

function doAuth(){
  google.accounts.id.initialize({
    client_id: _CID,
    callback: function(r){
      try{
        const p = JSON.parse(atob(r.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
        const em = (p.email||'').toLowerCase();
        if(_OK.includes(em)){
          sessionStorage.setItem('nv_ok',em);
          document.getElementById('auth-screen').classList.remove('show');
          document.body.classList.remove('locked');
        }else{
          const e = document.getElementById('aerr');
          e.style.display = 'block';
          e.innerHTML = '⚠️ El correo <b>'+em+'</b> no está autorizado.';
        }
      }catch(err){console.error(err);}
    }
  });
  google.accounts.id.prompt();
}
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
