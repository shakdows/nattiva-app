<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nattiva Estate — Plataforma Inmobiliaria</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --crimson:#A8191B;--crimson-d:#7C1012;
  --gold:#C49A3C;--gold-l:#DEB96A;
  --ink:#111111;--ink-60:rgba(17,17,17,.6);--ink-20:rgba(17,17,17,.1);
  --paper:#F8F6F2;--white:#FFFFFF;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Jost',sans-serif;
  --sh:0 2px 16px rgba(0,0,0,.07);
  --sh-md:0 8px 32px rgba(0,0,0,.12);
  --sh-lg:0 20px 60px rgba(0,0,0,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{font-family:var(--sans);cursor:pointer;border:none;background:none}

header{position:sticky;top:0;z-index:300;background:rgba(248,246,242,.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--ink-20);height:66px;}
.hd-inner{max-width:1280px;margin:0 auto;padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between;}
.burger{display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.burger span{display:block;height:1.5px;background:var(--ink);border-radius:2px}
.burger span:nth-child(2){width:14px}
.logo{font-family:var(--serif);font-size:26px;font-weight:300;letter-spacing:.04em;display:flex;align-items:baseline;gap:4px}
.logo-mark{color:var(--crimson);font-weight:600;font-style:italic}
.logo-sep{color:var(--gold);font-size:11px;margin:0 5px}
.logo-sub{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-60)}
.notif{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;transition:background .2s}
.notif:hover{background:var(--ink-20)}
.notif svg{width:19px;height:19px;stroke:var(--ink);stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.notif-dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--crimson);border:1.5px solid var(--paper)}

#page-home main{max-width:1280px;margin:0 auto;padding:36px 20px 110px;display:flex;flex-direction:column;gap:30px;}
@media(max-width:768px){#page-home main{padding:20px 16px 100px;gap:18px}}

.profile-hero{border-radius:22px;overflow:hidden;height:460px;position:relative;box-shadow:var(--sh-lg);background:#0D0101;animation:up .6s cubic-bezier(.22,1,.36,1) both;width:100%;}
@media(max-width:1024px){.profile-hero{height:360px}}
@media(max-width:768px){.profile-hero{height:280px;border-radius:16px}}

#profile-photo-div{
  position:absolute;
  left:40%;right:0;top:0;bottom:0;
  background-image:url('data:image/png;base64,...'); /* TU IMAGEN AQUÍ */
  background-size:cover;
  background-position:center 10%; /* CAMBIO REALIZADO: Ajusta el encuadre vertical */
  background-repeat:no-repeat;
  pointer-events:none;
  z-index:1;
}

.profile-overlay{position:absolute;inset:0;z-index:2;background:linear-gradient(95deg,rgba(8,0,0,1) 0%,rgba(70,3,3,.98) 18%,rgba(8,1,1,.92) 30%,rgba(4,0,0,.70) 40%,rgba(0,0,0,.25) 50%,rgba(0,0,0,.05) 58%,transparent 64%);}
.profile-hero::after{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;z-index:4;background:linear-gradient(180deg,var(--gold-l),var(--gold) 60%,transparent);}

.profile-content{position:absolute;left:0;top:0;bottom:0;width:50%;z-index:3;padding:48px 32px 44px 52px;display:flex;flex-direction:column;justify-content:center;gap:16px;}
@media(max-width:1024px){.profile-content{padding:36px 24px 36px 40px;gap:12px}}
@media(max-width:768px){.profile-content{padding:22px 16px 22px 26px;width:60%;gap:9px}}

.p-eyebrow{font-size:10px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-l)}
.p-name{font-family:var(--serif);font-size:58px;font-weight:300;color:var(--white);line-height:1.0}
@media(max-width:1024px){.p-name{font-size:44px}}
@media(max-width:768px){.p-name{font-size:30px}}
.p-creds{font-size:14px;color:rgba(255,255,255,.55);letter-spacing:.05em}
.p-exp{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:5px 13px;font-size:11px;font-weight:500;letter-spacing:.08em;color:rgba(255,255,255,.82);width:fit-content}
.p-exp::before{content:'◈';color:var(--gold);font-size:9px}
.p-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.97);border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;letter-spacing:.02em;color:var(--ink);box-shadow:0 4px 16px rgba(0,0,0,.3);width:fit-content}
.p-badge span{color:var(--crimson)}
.p-rating{display:flex;align-items:center;gap:10px}
.p-score{font-family:var(--serif);font-size:30px;font-weight:600;color:var(--white)}
.p-stars span{color:var(--gold);font-size:17px}
.p-count{font-size:13px;color:rgba(255,255,255,.45)}
</style>
</head>
<body>
<!-- Resto de tu contenido HTML se mantiene igual -->
</body>
</html>
